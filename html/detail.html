<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bean Detail</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/detail.css">

</head>
<body>
    <div id="main-header"></div>

    <div class="detail-container">
        <div class="image-side" id="bean-image">
            <img src="" alt="bean-image">
        </div>

        <div class="content-section">
            <div class="page-wrapper">
                <h1></h1>
                <span class="origin"></span>

                <div class="bean-type-tags">
                    <span class="species-tag"></span>
                    <span class="caffeine-tag"></span>
                </div>
            </div>

            <div class="sensory-section">
                <h3>Flavor Notes</h3>
                <p class="flavor"></p>

                <h3>Aroma</h3>
                <p class="aroma"></p>
            </div>

            <div class="spec-section">
                <div class="spec-item">
                    <span class="label">Acidity</span>
                    <div class="dots-container" id="acidity-dots">
                        <span class="dot"></span>
                        <span class="dot"></span>
                        <span class="dot"></span>
                        <span class="dot"></span>
                        <span class="dot"></span>
                    </div>
                </div>

                <div class="spec-item">
                    <span class="label">Body</span>
                    <div class="dots-container" id="body-dots">
                        <span class="dot"></span>
                        <span class="dot"></span>
                        <span class="dot"></span>
                        <span class="dot"></span>
                        <span class="dot"></span>
                    </div>
                </div>

                <div class="spec-item">
                    <span class="label">Roast Level</span>
                    <div class="dots-container" id="roast-dots">
                        <span class="dot"></span>
                        <span class="dot"></span>
                        <span class="dot"></span>
                        <span class="dot"></span>
                        <span class="dot"></span>
                    </div>
                </div>
            </div>

            <div class="description">
                <h3>About This Coffee</h3>
                <p class="about"></p>

                <h3>Brewing Recommendation</h3>
                <p class="brew"></p>
            </div>
        </div>


    </div>


    <script>
        fetch('header.html')
            .then(response => {
                if (!response.ok) throw new Error('Header not found');
                return response.text();
            })
            .then(data => {
                document.getElementById('main-header').innerHTML = data;
            })
            .catch(error => {
                console.error('Error:', error)
            });
    </script>

    <script src="../Javascript/data.js"></script>
    <script src="../Javascript/detail.js"></script>
</body>

</html>
